name: CI/CD FastAPI to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t shrikantpawars/fastapi:latest .

    # 4. Push to DockerHub
    - name: Push Docker Image
      run: |
        docker push shrikantpawars/fastapi:latest

    # 5. Deploy to EC2
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull latest image
          docker pull shrikantpawars/fastapi:latest

          # Stop and remove old container
          docker stop fastapi_container || true
          docker rm fastapi_container || true

          # Create data directory if not exists
          mkdir -p ~/data

          # Run new container
          docker run -d -p 8000:8000 \
          --name fastapi_container \
          -v ~/data:/app/app/data \
          shrikantpawars/fastapi:latest